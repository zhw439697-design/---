<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Modern Gradient for the path -->
    <linearGradient id="cycle-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.4" />
      <stop offset="50%" stop-color="#10b981" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.4" />
    </linearGradient>
    
    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Large Elliptical Path flowing around the four corners -->
  <!-- Moving nodes to corners:
       NW: 480, 270
       NE: 1440, 270
       SE: 1440, 810
       SW: 480, 810
  -->
  <path d="M480 270
           Q 960 100 1440 270
           Q 1650 540 1440 810
           Q 960 980 480 810
           Q 270 540 480 270 Z" 
        stroke="url(#cycle-gradient)" 
        stroke-width="3" 
        fill="none" 
        stroke-linecap="round"
        stroke-dasharray="10 10"
        filter="url(#glow)"
  />

  <!-- Nodes - Placed atCorners -->
  
  <!-- Top Left: Mining/Raw Materials -->
  <g transform="translate(480, 270)">
    <circle r="40" fill="white" stroke="#3b82f6" stroke-width="2" class="animate-pulse" opacity="0.95"/>
    <text x="0" y="65" text-anchor="middle" fill="#475569" font-size="16" font-weight="600" font-family="sans-serif">原材料获取</text>
    <path d="M0 -14 L12 0 L0 14 L-12 0 Z" stroke="#3b82f6" stroke-width="2" fill="none"/>
  </g>

  <!-- Top Right: Manufacturing -->
  <g transform="translate(1440, 270)">
    <circle r="40" fill="white" stroke="#0ea5e9" stroke-width="2" opacity="0.95"/>
    <text x="0" y="65" text-anchor="middle" fill="#475569" font-size="16" font-weight="600" font-family="sans-serif">电池制造</text>
    <rect x="-12" y="-16" width="24" height="28" rx="3" stroke="#0ea5e9" stroke-width="2" fill="none"/>
    <path d="M-5 -21 L5 -21" stroke="#0ea5e9" stroke-width="2"/>
  </g>

  <!-- Bottom Right: Usage/EV -->
  <g transform="translate(1440, 810)">
    <circle r="40" fill="white" stroke="#f59e0b" stroke-width="2" opacity="0.95"/>
    <text x="0" y="65" text-anchor="middle" fill="#475569" font-size="16" font-weight="600" font-family="sans-serif">梯次利用</text>
    <path d="M-5 -10 L7 -10 L3 0 L10 0 L-2 12 L-2 2 L-10 2 Z" stroke="#f59e0b" stroke-width="2" fill="none" stroke-linejoin="round"/>
  </g>

  <!-- Bottom Left: Recycling -->
  <g transform="translate(480, 810)">
    <circle r="40" fill="white" stroke="#10b981" stroke-width="2" opacity="0.95"/>
    <text x="0" y="65" text-anchor="middle" fill="#475569" font-size="16" font-weight="600" font-family="sans-serif">回收再生</text>
    <path d="M-10 -7 A 12 12 0 0 1 10 -7 M10 7 A 12 12 0 0 1 -10 7 M-12 0 L-16 5 M-12 0 L-8 5" stroke="#10b981" stroke-width="2" fill="none"/>
  </g>

  <!-- Center Abstract Ring (Subtle background for the form) -->
  <circle cx="960" cy="540" r="320" stroke="url(#cycle-gradient)" stroke-width="1" stroke-dasharray="4 8" opacity="0.15" fill="none"/>
  <circle cx="960" cy="540" r="280" stroke="#3b82f6" stroke-width="0.5" opacity="0.1" fill="none"/>

</svg>
